{% extends "base.html" %}
{% block title %}Acceso - Kroot Corp IA{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 to-slate-900 p-4">
    <div class="bg-white dark:bg-darkcard w-full max-w-md p-8 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary text-white rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-robot"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Kroot Corp IA</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Acceso al Sistema de Agentes Autónomos</p>
        </div>

        {% if error %}
            <div class="mb-6 p-4 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Usuario</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fa-solid fa-user"></i></span>
                    <input name="username" type="text" required class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="Ingresa tu usuario">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Contraseña</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fa-solid fa-lock"></i></span>
                    <input name="password" type="password" required class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
                Iniciar Sesión
            </button>
        </form>
        <div class="mt-6 text-center text-xs text-gray-500 dark:text-gray-400">
            ⚡ Sistema de Monitoreo y Generación de Informes ⚡<br>© 2024 Kroot Corp
        </div>
    </div>
</div>
{% endblock %}
